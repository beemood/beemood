properties:
  resource:
    type: string
    required: true
    unique: true
    minLength: 3
    maxLength: 30
    casing: screaming-snake
    inputType: text

  action:
    type: string
    isIn:
      - READ
      - WRITE
      - UPDATE
      - DELETE
    inputType: radio

uniques:
  - resource
  - action
