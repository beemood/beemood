properties:
  username:
    type: string
    required: true
    unique: true
    format: email
    casing: lower
    inputType: text

  password:
    type: string
    required: true
    format: password
    inputType: password
    hash: true

relations:
  roles:
    type: many-to-many
    target: Role

  permissions:
    type: many-to-many
    target: Permission
